name: Deploy

on:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx jest --passWithNoTests

  eas-update:
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npx eas update --branch main --message "$(git log -1 --pretty=%B)" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  eas-build:
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npx eas build --platform android --profile preview --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        id: build

      - name: Download APK from EAS
        run: |
          sleep 300
          BUILD_ID="${{ steps.build.outputs.buildId }}"
          npx eas build:download "$BUILD_ID" --platform android --output app-release.apk --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable
          name: "Japaratinga FM — Última versão"
          body: |
            APK gerado automaticamente pelo pipeline de CI/CD.

            Commit: ${{ github.sha }}
            Data: ${{ github.event.head_commit.timestamp }}
            Mensagem: ${{ github.event.head_commit.message }}
          files: app-release.apk
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
