name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx jest --passWithNoTests

  eas-update:
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest
      - name: EAS Update
        run: eas update --branch main --message "$(git log -1 --pretty=%B)" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_STREAM_URL: https://147.15.107.66.nip.io/stream

  eas-build:
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - run: npm ci
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest
      - name: EAS Build
        run: |
          eas build --platform android --profile preview --non-interactive --wait 2>&1 | tee build.log
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_NO_VCS: 1
      - name: Download APK via build URL
        run: |
          BUILD_URL=$(eas build:list --json --limit=1 --platform=android --non-interactive 2>/dev/null | \
            python3 -c "import sys,json; print(json.load(sys.stdin)[0]['artifacts']['buildUrl'])")
          echo "URL: $BUILD_URL"
          curl -H "Authorization: Bearer ${{ secrets.EXPO_TOKEN }}" -fsSL -o app-release.apk "$BUILD_URL"
          ls -la app-release.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: stable
          name: "Japaratinga FM — Última versão"
          body: |
            APK gerado automaticamente pelo pipeline de CI/CD.

            Commit: ${{ github.sha }}
            Data: ${{ github.event.head_commit.timestamp }}
            Mensagem: ${{ github.event.head_commit.message }}
          files: app-release.apk
          make_latest: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
